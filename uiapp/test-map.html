<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapbox Test</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

<style>
body{margin:0}
#map{width:100%;height:100vh}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<script>

const TOKEN = "pk.xxxxxxxxxxxxxxxxxxxxxxxxx"

mapboxgl.accessToken = TOKEN

const map = new mapboxgl.Map({
 container:'map',
 style:'mapbox://styles/mapbox/streets-v12',
 center:[139.6455,35.8617],
 zoom:13
})

async function geocode(address){

 const url =
 "https://api.mapbox.com/geocoding/v5/mapbox.places/"
 + encodeURIComponent(address)
 + ".json?limit=1&language=ja&access_token="
 + TOKEN

 const r = await fetch(url)
 const d = await r.json()

 console.log("GEO RESULT",d)

 if(d.features.length){

   const c = d.features[0].center

   map.setCenter(c)

   new mapboxgl.Marker()
   .setLngLat(c)
   .addTo(map)

 }

}

map.on("load",()=>{

 geocode("埼玉県さいたま市浦和区本太2-9-25")

})

</script>

</body>
</html>
